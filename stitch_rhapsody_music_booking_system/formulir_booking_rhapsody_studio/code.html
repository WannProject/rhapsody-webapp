<!-- TopAppBar -->

<div class="flex items-center">

<main class="pt-20 pb-32 px-margin-mobile max-w-2xl mx-auto">

<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-1">SELECTED STUDIO</span>

<p class="font-body-md text-body-md text-on-surface-variant">24 Nov, 14:00 - 16:00 WIB</p>
</div>
</div>

<!-- Main Form -->
<form class="space-y-lg">
<!-- Customer Identity -->
<div class="space-y-md">
<div class="group">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block uppercase tracking-wider">Nama Pelanggan</label>
<input class="w-full bg-[#121212] border border-[#1A1A1A] px-md py-3 text-white font-body-md form-input-focus transition-all duration-300" placeholder="Masukkan nama lengkap" type="text">
</div>
<div class="group">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block uppercase tracking-wider">No. HP</label>
<input class="w-full bg-[#121212] border border-[#1A1A1A] px-md py-3 text-white font-body-md form-input-focus transition-all duration-300" placeholder="+62 8xx xxxx xxxx" type="tel">
</div>
</div>
<!-- Priority Criteria -->
<div class="pt-lg border-t border-[#1A1A1A] space-y-md">
<div class="flex items-center justify-between">
<h3 class="font-label-sm text-label-sm text-white uppercase tracking-widest">Priority Criteria</h3>
<div class="flex items-center bg-[#121212] border border-[#1A1A1A] p-1">
<button class="px-4 py-1 text-xs font-bold transition-all bg-white text-black" id="btn-member" onclick="toggleMember(true)" type="button">MEMBER</button>
<button class="px-4 py-1 text-xs font-bold transition-all text-on-surface-variant" id="btn-nonmember" onclick="toggleMember(false)" type="button">NON-MEMBER</button>

<option>Recording</option>
<option>Kursus</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>

</div>

                    </p>
</div>
</div>

<button class="w-full bg-white text-black py-4 font-headline-md text-headline-md font-bold hover:bg-opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-md" type="submit">

</button>

<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<script>
        function toggleMember(isMember) {
            const btnMember = document.getElementById('btn-member');
            const btnNonMember = document.getElementById('btn-nonmember');
            
            if (isMember) {
                btnMember.classList.add('bg-white', 'text-black');
                btnMember.classList.remove('text-on-surface-variant');
                btnNonMember.classList.remove('bg-white', 'text-black');
                btnNonMember.classList.add('text-on-surface-variant');
            } else {
                btnNonMember.classList.add('bg-white', 'text-black');
                btnNonMember.classList.remove('text-on-surface-variant');
                btnMember.classList.remove('bg-white', 'text-black');
                btnMember.classList.add('text-on-surface-variant');
            }
        }

        // Micro-interaction for input highlighting
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-white');
            });
            el.addEventListener('blur', () => {
                el.parentElement.querySelector('label').classList.replace('text-white', 'text-on-surface-variant');
            });
        });

        // Urgency button selector logic
        const urgencyBtns = document.querySelectorAll('button[type="button"].flex-1');
        urgencyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                urgencyBtns.forEach(b => b.classList.replace('border-white', 'border-[#1A1A1A]'));
                btn.classList.replace('border-[#1A1A1A]', 'border-white');
            });
        });
    </script>
