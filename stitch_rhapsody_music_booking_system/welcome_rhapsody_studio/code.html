<script>
    // Carousel Logic
    const carousel = document.getElementById('carousel');
    const indicators = document.querySelectorAll('#indicators > div');
    
    carousel.addEventListener('scroll', () => {
      const scrollPosition = carousel.scrollLeft;
      const slideWidth = carousel.offsetWidth;
      const activeIndex = Math.round(scrollPosition / slideWidth);
      
      indicators.forEach((dot, index) => {
        if (index === activeIndex) {
          dot.classList.add('dot-active');
          dot.classList.remove('w-2');
          dot.classList.add('w-6');
        } else {
          dot.classList.remove('dot-active');
          dot.classList.add('w-2');
          dot.classList.remove('w-6');
        }
      });
    });

    // Simple auto-scroll micro-interaction
    let autoScroll = setInterval(() => {
      const maxScroll = carousel.scrollWidth - carousel.clientWidth;
      if (carousel.scrollLeft >= maxScroll - 10) {
        carousel.scrollTo({ left: 0, behavior: 'smooth' });
      } else {
        carousel.scrollBy({ left: carousel.clientWidth, behavior: 'smooth' });
      }
    }, 5000);

    // Stop auto-scroll on user interaction
    carousel.addEventListener('touchstart', () => clearInterval(autoScroll));
    carousel.addEventListener('mousedown', () => clearInterval(autoScroll));
  </script>
