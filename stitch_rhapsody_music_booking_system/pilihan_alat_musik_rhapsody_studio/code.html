<!-- Micro-interaction Script -->
<script>
        const micCountEl = document.getElementById('mic-count');
        const micPlus = document.getElementById('mic-plus');
        const micMinus = document.getElementById('mic-minus');
        let count = 1;

        micPlus.addEventListener('click', () => {
            if(count < 3) {
                count++;
                micCountEl.textContent = count;
                micCountEl.classList.add('scale-110');
                setTimeout(() => micCountEl.classList.remove('scale-110'), 100);
            }
        });

        micMinus.addEventListener('click', () => {
            if(count > 0) {
                count--;
                micCountEl.textContent = count;
                micCountEl.classList.add('scale-90');
                setTimeout(() => micCountEl.classList.remove('scale-90'), 100);
            }
        });

        // Toggle Visual Style on Selection
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const card = this.closest('.equipment-card');
                if(this.checked) {
                    card.classList.replace('bg-surface-container-low', 'bg-surface-container-highest');
                    card.classList.add('border-primary');
                } else {
                    card.classList.replace('bg-surface-container-highest', 'bg-surface-container-low');
                    card.classList.remove('border-primary');
                }
            });
        });
    </script>
