services:
  mysql:
    image: mysql:8.4
    container_name: rhapsody-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rhapsody}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - rhapsody-mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "--silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rhapsody-mysql:
